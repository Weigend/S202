name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout S202
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build WFX
        run: |
          git clone --depth 1 https://github.com/Weigend/wfx.git /tmp/wfx
          cd /tmp/wfx
          mvn install -DskipTests --batch-mode

      - name: Build S202
        run: mvn clean install --batch-mode
